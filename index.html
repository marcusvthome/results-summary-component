<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>

  <main class="container">
    <div class="card">

      <div class="lado-esquerdo">

        <h3>Your Result</h3>
        <div class="score">
          <span class="numero">76</span>
          <span class="total">of 100</span>
        </div>

        <h2>Great</h2>
        <p>You scored higher than 65% of the people who have taken these tests.</p>

      </div>

      <div class="lado-direito">

        <h2>Summary</h2>

        <ul>

          <li class="reaction"> <img src="assets/images/icon-reaction.svg" alt="Reaction"> Reaction <span><b>80</b> /
              100</span></li>
          <li class="memory"> <img src="assets/images/icon-memory.svg" alt="Memory"> Memory <span><b>92</b> / 100</span>
          </li>
          <li class="verbal"> <img src="assets/images/icon-verbal.svg" alt="Verbal"> Verbal <span><b>61</b> / 100</span>
          </li>
          <li class="visual"> <img src="assets/images/icon-visual.svg" alt="Visual"> Visual <span><b>72</b> / 100</span>
          </li>

        </ul>

        <button>Continue</button>

      </div>
    </div>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/marcusvthome">Marcus Thomé</a>.
  </footer>
</body>

</html>
